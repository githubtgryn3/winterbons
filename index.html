<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Lite Pro</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h3 {
    margin: 15px 0;
    font-size: 16px;
}

#container {
    width: 100%;
    max-width: 420px;
    margin: auto;
    position: relative;
}

canvas {
    width: 100%;
    height: auto;
    background: white;
    border-radius: 12px;
    cursor: grab;
    touch-action: none;
    transition: filter 0.2s ease;
}

canvas.active {
    filter: brightness(0.85);
}

#snapIndicator {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;
    border: 4px solid transparent;
    transition: border 0.15s ease, opacity 0.2s;
    opacity: 0;
}

#snapIndicator.active {
    border-color: #2ecc71;
    opacity: 1;
}

button {
    margin: 15px;
    padding: 14px;
    width: calc(100% - 30px);
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:disabled {
    background: #ccc;
}

button:not(:disabled) {
    background: #2ecc71;
    color: white;
}
</style>
</head>

<body>

<h3 id="title">Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="1080" height="1080"></canvas>
    <div id="snapIndicator"></div>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>
<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');
const snapIndicator = document.getElementById('snapIndicator');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;
let rotation = 0;

// state
let isDragging = false;
let lastX = 0;
let lastY = 0;
let lastDistance = null;
let lastAngle = null;

// snap
const SNAP_ANGLES = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
const SNAP_THRESHOLD = 0.08;
let snapActive = false;

// =====================
// FRAME
// =====================
const hostname = window.location.hostname;
const frameMap = {
    "rtiq.bernad.my.id": "frame.png",
    "fam.bernad.my.id": "frame1.png"
};

let frameSrc = frameMap[hostname];

if (!frameSrc) {
    document.body.innerHTML = `<h2>Tidak ada frame untuk sub-domain ini!</h2>`;
    throw new Error("Frame tidak ditemukan");
}

const frame = new Image();
frame.src = frameSrc;

// =====================
// DRAW
// =====================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImage) {
        ctx.save();
        ctx.translate(canvas.width/2 + posX, canvas.height/2 + posY);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        ctx.drawImage(
            userImage,
            -userImage.width/2,
            -userImage.height/2
        );

        ctx.restore();
    }

    ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
}

// =====================
// HELPERS
// =====================
function getDistance(t) {
    return Math.hypot(
        t[0].clientX - t[1].clientX,
        t[0].clientY - t[1].clientY
    );
}

function getAngle(t) {
    return Math.atan2(
        t[1].clientY - t[0].clientY,
        t[1].clientX - t[0].clientX
    );
}

// =====================
// SNAP ROTATION
// =====================
function applySnap() {
    let snapped = false;

    for (let a of SNAP_ANGLES) {
        if (Math.abs(rotation - a) < SNAP_THRESHOLD) {
            rotation = a;
            snapped = true;

            if (!snapActive) {
                triggerHaptic();
            }

            snapActive = true;
            snapIndicator.classList.add('active');
            break;
        }
    }

    if (!snapped) {
        snapActive = false;
        snapIndicator.classList.remove('active');
    }
}

// =====================
// HAPTIC SIMULATION
// =====================
function triggerHaptic() {
    // vibrate (jika support)
    if (navigator.vibrate) {
        navigator.vibrate(10);
    }

    // visual pulse
    canvas.style.transform = "scale(0.995)";
    setTimeout(() => {
        canvas.style.transform = "scale(1)";
    }, 80);
}

// =====================
// LOAD IMAGE
// =====================
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
        userImage = img;

        scale = Math.max(
            canvas.width / img.width,
            canvas.height / img.height
        );

        posX = 0;
        posY = 0;
        rotation = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});

canvas.addEventListener('click', () => {
    if (!userImage) fileInput.click();
});

// =====================
// TOUCH
// =====================
canvas.addEventListener('touchstart', (e) => {
    if (!userImage) return;

    canvas.classList.add('active');

    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }

    if (e.touches.length === 2) {
        lastDistance = getDistance(e.touches);
        lastAngle = getAngle(e.touches);
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (!userImage) return;
    e.preventDefault();

    // drag
    if (e.touches.length === 1 && isDragging) {
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;

        posX += (x - lastX);
        posY += (y - lastY);

        lastX = x;
        lastY = y;
    }

    // pinch + rotate
    if (e.touches.length === 2) {
        const rect = canvas.getBoundingClientRect();

        // zoom
        let newDist = getDistance(e.touches);
        let zoomFactor = newDist / lastDistance;

        let newScale = scale * zoomFactor;
        newScale = Math.min(Math.max(0.2, newScale), 5);

        zoomFactor = newScale / scale;

        let centerX = (
            (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left
        ) * (canvas.width / rect.width);

        let centerY = (
            (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top
        ) * (canvas.height / rect.height);

        posX = centerX - (centerX - posX) * zoomFactor;
        posY = centerY - (centerY - posY) * zoomFactor;

        scale = newScale;
        lastDistance = newDist;

        // rotate
        let newAngle = getAngle(e.touches);
        let angleDiff = newAngle - lastAngle;

        rotation += angleDiff;
        lastAngle = newAngle;

        applySnap();
    }

    draw();
});

canvas.addEventListener('touchend', () => {
    isDragging = false;
    lastDistance = null;
    lastAngle = null;

    canvas.classList.remove('active');
    snapIndicator.classList.remove('active');
    snapActive = false;
});

// =====================
// DOWNLOAD
// =====================
downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = "twibbon.png";
    link.href = canvas.toDataURL('image/png');
    link.click();
});

// init
frame.onload = draw;
</script>

</body>
</html>
