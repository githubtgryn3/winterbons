<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winterbons</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h3 {
    margin: 15px 0;
    font-size: 16px;
}

#container {
    width: 100%;
    max-width: 420px;
    margin: auto;
}

canvas {
    width: 100%;
    height: auto;
    background: white;
    border-radius: 12px;
    cursor: grab;
    touch-action: none;
    image-rendering: auto;
    transition: transform 0.08s;
}

button {
    margin: 15px;
    padding: 14px;
    width: calc(100% - 30px);
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:disabled {
    background: #ccc;
}

button:not(:disabled) {
    background: #2ecc71;
    color: white;
}
</style>
</head>

<body>

<h3 id="title">Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');
const title = document.getElementById('title');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;
let rotation = 0;

// drag
let isDragging = false;
let lastX = 0;
let lastY = 0;

// touch
let lastDistance = null;
let lastAngle = null;
let lastCenter = null;

// state
let isTouching = false;
let snapActive = false;

// SNAP
const SNAP_ANGLES = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
const SNAP_THRESHOLD = 0.05;


// =====================
// SUBDOMAIN FRAME SYSTEM
// =====================
const hostname = window.location.hostname;

const frameMap = {
    "rtiq.bernad.my.id": "frame.png",
    "fam.bernad.my.id": "frame1.png"
};

let frameSrc = frameMap[hostname];

// jika tidak ada frame
if (!frameSrc) {
    document.body.innerHTML = `
        <h2 style="margin-top:50px;font-family:sans-serif;">
            Tidak ada frame untuk sub-domain ini!
        </h2>
    `;
    throw new Error("Frame tidak ditemukan");
}


// =====================
// FRAME LOAD
// =====================
const frame = new Image();
frame.src = frameSrc;


// =====================
// DRAW
// =====================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImage) {
        ctx.save();

        ctx.translate(canvas.width/2 + posX, canvas.height/2 + posY);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        ctx.drawImage(
            userImage,
            -userImage.width / 2,
            -userImage.height / 2
        );

        ctx.restore();
    }

    // dim frame saja
    if (isTouching) ctx.globalAlpha = 0.6;
    ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    // highlight rotate snap
    if (snapActive) {
        ctx.save();
        ctx.translate(canvas.width/2 + posX, canvas.height/2 + posY);

        ctx.strokeStyle = "#2ecc71";
        ctx.lineWidth = 4;

        ctx.beginPath();
        ctx.arc(0, 0, 220, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(0,-220);
        ctx.stroke();

        ctx.restore();
    }
}


// =====================
// SNAP
// =====================
function applySnap() {
    let snapped = false;

    for (let a of SNAP_ANGLES) {
        if (Math.abs(rotation - a) < SNAP_THRESHOLD) {
            rotation = a;
            snapped = true;

            if (!snapActive) triggerHaptic();
            snapActive = true;
            break;
        }
    }

    if (!snapped) snapActive = false;
}


// =====================
// HAPTIC
// =====================
function triggerHaptic() {
    if (navigator.vibrate) navigator.vibrate(10);

    canvas.style.transform = "scale(0.995)";
    setTimeout(() => canvas.style.transform = "scale(1)", 80);
}


// =====================
// LOAD IMAGE
// =====================
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
        userImage = img;

        scale = Math.max(
            canvas.width / img.width,
            canvas.height / img.height
        );

        posX = 0;
        posY = 0;
        rotation = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});


// klik upload
canvas.addEventListener('click', () => {
    if (!userImage) fileInput.click();
});


// =====================
// DESKTOP CONTROL
// =====================
canvas.addEventListener('mousedown', (e) => {
    if (!userImage) return;
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    canvas.style.cursor = "grabbing";
});

window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = "grab";
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    posX += (e.clientX - lastX);
    posY += (e.clientY - lastY);

    lastX = e.clientX;
    lastY = e.clientY;

    draw();
});


// =====================
// ZOOM DESKTOP
// =====================
canvas.addEventListener('wheel', (e) => {
    if (!userImage) return;
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

    let zoom = -e.deltaY * 0.001;
    let newScale = scale + zoom;

    newScale = Math.min(Math.max(0.2, newScale), 5);

    let scaleFactor = newScale / scale;

    posX = mouseX - (mouseX - posX) * scaleFactor;
    posY = mouseY - (mouseY - posY) * scaleFactor;

    scale = newScale;

    draw();
});


// =====================
// TOUCH CONTROL
// =====================
canvas.addEventListener('touchstart', (e) => {
    if (!userImage) return;

    isTouching = true;

    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }

    if (e.touches.length === 2) {
        lastDistance = getDistance(e.touches);
        lastAngle = getAngle(e.touches);
        lastCenter = getCenter(e.touches);
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (!userImage) return;
    e.preventDefault();

    // drag
    if (e.touches.length === 1 && isDragging) {
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;

        posX += (x - lastX);
        posY += (y - lastY);

        lastX = x;
        lastY = y;
    }

    // pinch + rotate + move
    if (e.touches.length === 2) {
        const rect = canvas.getBoundingClientRect();

        let newCenter = getCenter(e.touches);
        let newDist = getDistance(e.touches);
        let newAngle = getAngle(e.touches);

        // move ikut tengah jari
        posX += (newCenter.x - lastCenter.x) * (canvas.width / rect.width);
        posY += (newCenter.y - lastCenter.y) * (canvas.height / rect.height);

        // zoom
        let zoomFactor = newDist / lastDistance;
        let newScale = scale * zoomFactor;
        newScale = Math.min(Math.max(0.2, newScale), 5);

        scale = newScale;
        lastDistance = newDist;

        // rotate
        rotation += (newAngle - lastAngle);
        lastAngle = newAngle;

        lastCenter = newCenter;

        applySnap();
    }

    draw();
});

canvas.addEventListener('touchend', () => {
    isDragging = false;
    lastDistance = null;
    lastAngle = null;
    lastCenter = null;

    isTouching = false;
    snapActive = false;

    draw();
});


// =====================
// HELPERS
// =====================
function getDistance(touches) {
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}

function getAngle(touches) {
    return Math.atan2(
        touches[1].clientY - touches[0].clientY,
        touches[1].clientX - touches[0].clientX
    );
}

function getCenter(touches) {
    return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
    };
}


// =====================
// DOWNLOAD
// =====================
downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = generateFileName();
    link.href = canvas.toDataURL('image/png');
    link.click();
});

function generateFileName() {
    const now = new Date();

    const day = String(now.getDate()).padStart(2, '0');
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const month = months[now.getMonth()];
    const year = now.getFullYear();
    const timestamp = Date.now();

    return `RTIQ_${day} ${month} ${year}_${timestamp}.png`;
}


// ===== INIT =====
frame.onload = draw;
</script>

</body>
</html>
