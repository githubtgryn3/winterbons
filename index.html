<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Winterbons</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="shortcut icon" href="favicon.ico">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#canvasWrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1/1;
  margin-top: 20px;
  background: #ddd;
  overflow: hidden;
  touch-action: none;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#downloadBtn {
  margin: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: #fff;
  font-size: 16px;
  opacity: 0.5;
}

#downloadBtn.active {
  opacity: 1;
  cursor: pointer;
}

#msg {
  margin-top: 50px;
  font-size: 18px;
  color: #333;
}
</style>
</head>

<body>

<div id="msg" style="display:none">Tidak ada frame untuk sub-domain ini!</div>

<div id="canvasWrap" style="display:none">
  <canvas id="canvas"></canvas>
</div>

<h3 id="title">Klik Frame untuk Masukkan Foto</h3>

<button id="downloadBtn">Download</button>
<input type="file" id="fileInput" accept="image/*" hidden />

<script>
const hostname = location.hostname;
let frameSrc = null;

if (hostname.includes("rtiq1")) frameSrc = "rtiq1.png";
else if (hostname.includes("rtiq2")) frameSrc = "rtiq2.png";
else if (hostname.includes("fam")) frameSrc = "fam.png";

const msg = document.getElementById("msg");
const wrap = document.getElementById("canvasWrap");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const input = document.getElementById("fileInput");
const btn = document.getElementById("downloadBtn");
const title = document.getElementById("title");

// DEFAULT → TITLE MUNCUL
title.style.display = "block";
btn.style.display = "none";

// JIKA TIDAK ADA FRAME
if (!frameSrc) {
  msg.style.display = "block";
  title.style.display = "none";
  throw new Error("No frame");
}

// JIKA ADA FRAME
wrap.style.display = "block";

canvas.width = 1080;
canvas.height = 1080;

let frame = new Image();
let userImg = new Image();
let hasImage = false;

let state = { x:540, y:540, scale:1, rotation:0 };
let prevTouches = [];
let isTouching = false;
let snapType = null;
let lastSnap = null;

let isDragging = false;
let lastMouse = { x: 0, y: 0 };

frame.src = frameSrc;
frame.onload = draw;

wrap.addEventListener("click", () => {
  if (!hasImage) input.click();
});

input.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  userImg.src = url;

  userImg.onload = () => {
    hasImage = true;
    state = { x:540, y:540, scale:1, rotation:0 };

    btn.style.display = "block";
    btn.classList.add("active");
    title.style.display = "none";

    draw();
  };
};

function draw() {
  ctx.clearRect(0,0,1080,1080);

  if (hasImage) {
    ctx.save();
    ctx.translate(state.x, state.y);
    ctx.rotate(state.rotation);
    ctx.scale(state.scale, state.scale);
    ctx.drawImage(userImg, -userImg.width/2, -userImg.height/2);
    ctx.restore();
  }

  if (isTouching) ctx.globalAlpha = 0.5;
  ctx.drawImage(frame,0,0,1080,1080);
  ctx.globalAlpha = 1;

  if (isTouching && snapType) drawGuide();
}

function drawGuide() {
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 3;
  ctx.beginPath();

  if (snapType === 'vertical') {
    ctx.moveTo(540,0);
    ctx.lineTo(540,1080);
  } else if (snapType === 'horizontal') {
    ctx.moveTo(0,540);
    ctx.lineTo(1080,540);
  }

  ctx.stroke();
}

function detectSnap() {
  const deg = (state.rotation * 180/Math.PI) % 360;

  const snaps = [0,90,180,270];
  let closest = null;
  let minDiff = 999;

  snaps.forEach(s=>{
    let diff = Math.abs(deg - s);
    if(diff < minDiff){ minDiff = diff; closest = s; }
  });

  if(minDiff < 8){
    const targetRad = closest * Math.PI/180;
    state.rotation += (targetRad - state.rotation) * 0.2;
  }

  if(minDiff < 5){
    if(closest===0 || closest===180 || closest===360) snapType='vertical';
    else snapType='horizontal';

    if(lastSnap !== closest){
      if(navigator.vibrate) navigator.vibrate(10);
      lastSnap = closest;
    }
  } else {
    snapType = null;
    lastSnap = null;
  }
}

// TOUCH
wrap.addEventListener("touchstart", e => {
  isTouching = true;
  prevTouches = [...e.touches].map(t => ({x:t.clientX,y:t.clientY}));
  detectSnap();
  draw();
});

wrap.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!hasImage) return;

  const touches = [...e.touches].map(t => ({x:t.clientX,y:t.clientY}));

  if (touches.length === 1 && prevTouches.length === 1) {
    const dx = touches[0].x - prevTouches[0].x;
    const dy = touches[0].y - prevTouches[0].y;

    const scaleFactor = 1080 / wrap.clientWidth;
    state.x += dx * scaleFactor;
    state.y += dy * scaleFactor;
  }

  if (touches.length === 2 && prevTouches.length === 2) {
    const a = touches[0], b = touches[1];
    const pa = prevTouches[0], pb = prevTouches[1];

    const dist = Math.hypot(b.x-a.x,b.y-a.y);
    const pdist = Math.hypot(pb.x-pa.x,pb.y-pa.y);
    state.scale *= dist/pdist;

    const angle = Math.atan2(b.y-a.y,b.x-a.x);
    const pangle = Math.atan2(pb.y-pa.y,pb.x-pa.x);
    state.rotation += angle - pangle;
  }

  detectSnap();
  prevTouches = touches;
  draw();
});

wrap.addEventListener("touchend", () => {
  isTouching = false;
  snapRotation();
  snapType = null;
  lastSnap = null;
  draw();
});

function snapRotation(){
  const deg = state.rotation * 180/Math.PI;
  [0,90,180,270].forEach(s=>{
    if(Math.abs(deg - s) < 5){
      state.rotation = s * Math.PI/180;
    }
  });
}

// MOUSE DRAG
wrap.addEventListener("mousedown", e => {
  if (!hasImage) return;
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  isTouching = true;
  draw();
});

wrap.addEventListener("mousemove", e => {
  if (!isDragging) return;

  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;

  const scaleFactor = 1080 / wrap.clientWidth;
  state.x += dx * scaleFactor;
  state.y += dy * scaleFactor;

  lastMouse = { x: e.clientX, y: e.clientY };

  detectSnap();
  draw();
});

wrap.addEventListener("mouseup", () => {
  isDragging = false;
  isTouching = false;
  snapRotation();
  snapType = null;
  lastSnap = null;
  draw();
});

wrap.addEventListener("mouseleave", () => {
  isDragging = false;
  isTouching = false;
  draw();
});

// SCROLL
wrap.addEventListener("wheel", e => {
  if (!hasImage) return;
  e.preventDefault();

  if (e.ctrlKey) {
    state.rotation += e.deltaY * -0.002;
    detectSnap();
  } else {
    state.scale += e.deltaY * -0.001;
  }

  draw();
});

// DOWNLOAD
btn.onclick = () => {
  if (!hasImage) return;

  const link = document.createElement("a");
  const date = new Date();
  const name = `RTIQ_${date.toDateString()}_${Date.now()}.png`;

  link.download = name;
  link.href = canvas.toDataURL();
  link.click();
};
</script>

</body>
</html>
