<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lite Frame Processor</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; overflow: hidden; touch-action: none; }
        #app { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        .canvas-container { position: relative; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; cursor: crosshair; }
        canvas { border-radius: 8px; }
        #controls { margin-top: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; width: 100%; font-size: 16px; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .guide-line { position: absolute; background: var(--success); display: none; z-index: 10; pointer-events: none; }
        .guide-v { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        .guide-h { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        .error-msg { color: #dc2626; font-weight: bold; }
        #input-file { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="main-ui" style="display:none;">
        <div class="canvas-container" id="wrapper">
            <div id="guide-v" class="guide-line guide-v"></div>
            <div id="guide-h" class="guide-line guide-h"></div>
            <canvas id="c"></canvas>
        </div>
        <div id="controls">
            <input type="file" id="input-file" accept="image/*">
            <button id="download-btn" disabled>Download Gambar</button>
            <p style="font-size: 12px; color: #666; margin-top: 10px;">Sentuh frame untuk ganti foto. Gunakan 2 jari untuk zoom/rotate.</p>
        </div>
    </div>
    <div id="error-ui" class="error-msg" style="display:none;">
        Tidak ada frame untuk sub-domain ini!
    </div>
</div>

<script>
    const canvas = new fabric.Canvas('c', { preserveObjectStacking: true });
    const downloadBtn = document.getElementById('download-btn');
    const inputFile = document.getElementById('input-file');
    const guideV = document.getElementById('guide-v');
    const guideH = document.getElementById('guide-h');
    
    let frameImage = "";
    const hostname = window.location.hostname;

    // 1. Logika Penentuan Frame berdasarkan Domain
    if (hostname.includes("rtiq.bernad.my.id")) {
        frameImage = "frame.png";
    } else if (hostname.includes("fam.bernad.my.id")) {
        frameImage = "frame1.png";
    } else {
        // Mode development/lokal (hapus jika sudah deploy)
        if(hostname === "localhost" || hostname === "127.0.0.1") frameImage = "frame.png"; 
        else document.getElementById('error-ui').style.display = 'block';
    }

    if (frameImage) {
        document.getElementById('main-ui').style.display = 'block';
        initApp();
    }

    function initApp() {
        // Set ukuran canvas (misal 1080x1080 responsif)
        const size = Math.min(window.innerWidth - 40, 500);
        canvas.setWidth(size);
        canvas.setHeight(size);

        // Load Frame
        fabric.Image.fromURL(frameImage, function(img) {
            img.set({
                selectable: false,
                evented: true, // Agar bisa diklik
                width: canvas.width,
                height: canvas.height,
                originX: 'left',
                originY: 'top'
            });
            canvas.add(img);
            canvas.bringToFront(img);
            
            // Efek Transparansi saat disentuh
            img.on('mousedown', () => { 
                if(!canvas.getActiveObject()) { // Jika klik frame (bukan foto)
                    img.set('opacity', 0.5); 
                    canvas.renderAll();
                    inputFile.click(); 
                }
            });
            
            // Loop global mouseup untuk reset opacity
            canvas.on('mouse:up', () => {
                img.set('opacity', 1);
                canvas.renderAll();
            });
        });

        // Handle Upload Foto
        inputFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(userImg) {
                    // Bersihkan foto lama jika ada
                    const oldImg = canvas.getObjects().find(obj => obj !== canvas.getObjects()[0]);
                    if(oldImg) canvas.remove(oldImg);

                    userImg.set({
                        originX: 'center',
                        originY: 'center',
                        left: canvas.width / 2,
                        top: canvas.height / 2,
                    });
                    
                    // Skala awal agar menutupi canvas
                    userImg.scaleToWidth(canvas.width);
                    
                    canvas.add(userImg);
                    userImg.sendToBack(); // Di bawah frame
                    canvas.setActiveObject(userImg);
                    downloadBtn.disabled = false;
                });
            };
            reader.readAsDataURL(file);
        });

        // Snap Rotation Logic & Guides
        canvas.on('object:rotating', function(e) {
            const obj = e.target;
            const angle = obj.angle % 360;
            const snapPoints = [0, 90, 180, 270, 360];
            const threshold = 5;

            let snapped = false;
            snapPoints.forEach(snap => {
                if (Math.abs(angle - snap) < threshold) {
                    obj.set('angle', snap);
                    snapped = true;
                }
            });

            if (snapped) {
                guideV.style.display = 'block';
                guideH.style.display = 'block';
            } else {
                guideV.style.display = 'none';
                guideH.style.display = 'none';
            }
        });

        canvas.on('mouse:up', () => {
            guideV.style.display = 'none';
            guideH.style.display = 'none';
        });

        // Download Logic
        downloadBtn.addEventListener('click', () => {
            // Deselect objek agar border biru hilang di hasil download
            canvas.discardActiveObject().renderAll();
            
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            
            const date = new Date();
            const dateStr = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, ' ');
            const timestamp = Math.floor(Date.now() / 1000);
            
            const link = document.createElement('a');
            link.download = `RTIQ_${dateStr}_${timestamp}.png`;
            link.href = dataURL;
            link.click();
        });
    }

    // Support Scroll Zoom (Desktop)
    canvas.on('mouse:wheel', function(opt) {
        const delta = opt.e.deltaY;
        let zoom = canvas.getZoom();
        zoom *= 0.999 ** delta;
        if (zoom > 20) zoom = 20;
        if (zoom < 0.01) zoom = 0.01;
        
        const obj = canvas.getActiveObject();
        if(obj && obj !== canvas.getObjects()[0]) {
            obj.scale(obj.scaleX * (zoom / canvas.getZoom()));
            canvas.renderAll();
        }
        opt.e.preventDefault();
        opt.e.stopPropagation();
    });
</script>

</body>
</html>
