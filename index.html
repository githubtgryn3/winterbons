<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winterbons</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h3 {
    margin: 15px 0;
    font-size: 16px;
}

#container {
    width: 100%;
    max-width: 420px;
    margin: auto;
}

canvas {
    width: 100%;
    height: auto;
    background: white;
    border-radius: 12px;
    cursor: grab;
    touch-action: none;
    image-rendering: auto;
}

button {
    margin: 15px;
    padding: 14px;
    width: calc(100% - 30px);
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:disabled {
    background: #ccc;
}

button:not(:disabled) {
    background: #2ecc71;
    color: white;
}
</style>
</head>

<body>

<h3>Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;
let rotation = 0;

// drag
let isDragging = false;
let lastX = 0;
let lastY = 0;

// touch
let lastDistance = null;
let lastAngle = null;


// =====================
// SUBDOMAIN FRAME
// =====================
const hostname = window.location.hostname;

const frameMap = {
    "rtiq.bernad.my.id": "frame.png",
    "fam.bernad.my.id": "frame1.png"
};

let frameSrc = frameMap[hostname];

if (!frameSrc) {
    document.body.innerHTML = `<h2 style="margin-top:50px;">Tidak ada frame untuk sub-domain ini!</h2>`;
    throw new Error("Frame tidak ditemukan");
}

const frame = new Image();
frame.src = frameSrc;


// =====================
// DRAW
// =====================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImage) {
        ctx.save();

        ctx.translate(canvas.width / 2 + posX, canvas.height / 2 + posY);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);

        ctx.drawImage(
            userImage,
            -userImage.width / 2,
            -userImage.height / 2
        );

        ctx.restore();
    }

    ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
}


// =====================
// LOAD IMAGE
// =====================
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
        userImage = img;

        scale = Math.max(
            canvas.width / img.width,
            canvas.height / img.height
        );

        posX = 0;
        posY = 0;
        rotation = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});

canvas.addEventListener('click', () => {
    if (!userImage) fileInput.click();
});


// =====================
// DESKTOP DRAG
// =====================
canvas.addEventListener('mousedown', (e) => {
    if (!userImage) return;
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    posX += (e.clientX - lastX);
    posY += (e.clientY - lastY);

    lastX = e.clientX;
    lastY = e.clientY;

    draw();
});


// =====================
// DESKTOP ZOOM
// =====================
canvas.addEventListener('wheel', (e) => {
    if (!userImage) return;
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);

    let zoom = -e.deltaY * 0.001;
    let newScale = Math.min(Math.max(0.2, scale + zoom), 5);

    let factor = newScale / scale;

    posX = mx - (mx - posX) * factor;
    posY = my - (my - posY) * factor;

    scale = newScale;

    draw();
});


// =====================
// TOUCH CONTROL (PINCH + ROTATE)
// =====================
canvas.addEventListener('touchstart', (e) => {
    if (!userImage) return;

    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }

    if (e.touches.length === 2) {
        lastDistance = getDistance(e.touches);
        lastAngle = getAngle(e.touches);
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (!userImage) return;
    e.preventDefault();

    // drag
    if (e.touches.length === 1 && isDragging) {
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;

        posX += x - lastX;
        posY += y - lastY;

        lastX = x;
        lastY = y;
    }

    // pinch + rotate
    if (e.touches.length === 2) {
		const rect = canvas.getBoundingClientRect();

		// posisi tengah pinch (screen → canvas)
		const cx = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * (canvas.width / rect.width);
		const cy = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) * (canvas.height / rect.height);

		// hitung jarak & sudut baru
		const newDist = getDistance(e.touches);
		const newAngle = getAngle(e.touches);

		// === SCALE ===
		let scaleFactor = newDist / lastDistance;
		let newScale = scale * scaleFactor;
		newScale = Math.min(Math.max(0.2, newScale), 5);
		scaleFactor = newScale / scale;

		// === ROTATION ===
		let deltaAngle = newAngle - lastAngle;

		// normalisasi biar tidak loncat
		if (deltaAngle > Math.PI) deltaAngle -= 2 * Math.PI;
		if (deltaAngle < -Math.PI) deltaAngle += 2 * Math.PI;

		let newRotation = rotation + deltaAngle;

		// === APPLY TRANSFORM DENGAN ANCHOR PINCH ===
		// geser ke origin → transform → balik lagi
		posX = cx - (cx - posX) * scaleFactor;
		posY = cy - (cy - posY) * scaleFactor;

		// rotasi terhadap center pinch
		const dx = posX - cx;
		const dy = posY - cy;

		const cos = Math.cos(deltaAngle);
		const sin = Math.sin(deltaAngle);

		posX = cx + (dx * cos - dy * sin);
		posY = cy + (dx * sin + dy * cos);

		scale = newScale;
		rotation = newRotation;

		// === SNAP ROTATION ===
		const snap = Math.PI / 2;
		const threshold = 0.12;

		const snapped = Math.round(rotation / snap) * snap;
		if (Math.abs(rotation - snapped) < threshold) {
			rotation = snapped;
		}

		lastDistance = newDist;
		lastAngle = newAngle;
	}
    draw();
});

canvas.addEventListener('touchend', () => {
    isDragging = false;
    lastDistance = null;
    lastAngle = null;
});

function getDistance(touches) {
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}

function getAngle(touches) {
    return Math.atan2(
        touches[1].clientY - touches[0].clientY,
        touches[1].clientX - touches[0].clientX
    );
}


// =====================
// DOWNLOAD
// =====================
downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = generateFileName();
    link.href = canvas.toDataURL('image/png');
    link.click();
});

function generateFileName() {
    const now = new Date();

    const day = String(now.getDate()).padStart(2, '0');
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const month = months[now.getMonth()];
    const year = now.getFullYear();
    const timestamp = Date.now();

    return `RTIQ_${day} ${month} ${year}_${timestamp}.png`;
}

frame.onload = draw;
</script>

</body>
</html>
