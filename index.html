<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Lite</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h3 {
    margin: 15px 0;
    font-size: 16px;
}

#container {
    width: 100%;
    max-width: 420px;
    margin: auto;
}

canvas {
    width: 100%;
    height: auto;
    background: white;
    border-radius: 12px;
    touch-action: none;
    cursor: grab;
}

button {
    margin: 15px;
    padding: 14px;
    width: calc(100% - 30px);
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:disabled {
    background: #ccc;
}

button:not(:disabled) {
    background: #2ecc71;
    color: white;
}
</style>
</head>

<body>

<h3>Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;

// drag
let isDragging = false;
let lastX = 0;
let lastY = 0;

// touch
let lastDistance = null;

// ===== FRAME =====
const frame = new Image();
frame.src = "frame.png"; // ganti jika perlu

// ===== DRAW =====
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImage) {
        ctx.save();
        ctx.translate(posX, posY);
        ctx.scale(scale, scale);

        ctx.drawImage(
            userImage,
            canvas.width / 2 - userImage.width / 2,
            canvas.height / 2 - userImage.height / 2
        );

        ctx.restore();
    }

    ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
}

// ===== LOAD IMAGE =====
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
        userImage = img;

        // auto fit
        scale = Math.max(
            canvas.width / img.width,
            canvas.height / img.height
        );

        posX = 0;
        posY = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});

// klik untuk upload
canvas.addEventListener('click', () => {
    if (!userImage) fileInput.click();
});


// =====================
// DESKTOP CONTROL
// =====================
canvas.addEventListener('mousedown', (e) => {
    if (!userImage) return;
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    canvas.style.cursor = "grabbing";
});

window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = "grab";
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    posX += (e.clientX - lastX);
    posY += (e.clientY - lastY);

    lastX = e.clientX;
    lastY = e.clientY;

    draw();
});

// zoom scroll
canvas.addEventListener('wheel', (e) => {
    if (!userImage) return;
    e.preventDefault();

    let zoom = -e.deltaY * 0.001;
    scale += zoom;

    scale = Math.min(Math.max(0.2, scale), 5);

    draw();
});


// =====================
// TOUCH CONTROL (MOBILE)
// =====================
canvas.addEventListener('touchstart', (e) => {
    if (!userImage) return;

    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }

    if (e.touches.length === 2) {
        lastDistance = getDistance(e.touches);
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (!userImage) return;
    e.preventDefault();

    // DRAG 1 JARI
    if (e.touches.length === 1 && isDragging) {
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;

        posX += (x - lastX);
        posY += (y - lastY);

        lastX = x;
        lastY = y;
    }

    // PINCH ZOOM
    if (e.touches.length === 2) {
        let newDist = getDistance(e.touches);
        let zoom = newDist / lastDistance;

        scale *= zoom;
        scale = Math.min(Math.max(0.2, scale), 5);

        lastDistance = newDist;
    }

    draw();
});

canvas.addEventListener('touchend', () => {
    isDragging = false;
    lastDistance = null;
});

// helper
function getDistance(touches) {
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}


// =====================
// DOWNLOAD
// =====================
downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');

    link.download = generateFileName();
    link.href = canvas.toDataURL('image/png');

    link.click();
});

function generateFileName() {
    const now = new Date();

    const day = String(now.getDate()).padStart(2, '0');

    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const month = months[now.getMonth()];

    const year = now.getFullYear();

    const timestamp = Date.now();

    return `RTIQ_${day} ${month} ${year}_${timestamp}.png`;
}


// ===== INIT =====
frame.onload = draw;
</script>

</body>
</html>
