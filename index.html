<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winterbons</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h3 {
    margin: 15px 0;
    font-size: 16px;
}

#container {
    width: 100%;
    max-width: 420px;
    margin: auto;
}

canvas {
    width: 100%;
    height: auto;
    background: white;
    border-radius: 12px;
    touch-action: none;
}

button {
    margin: 15px;
    padding: 14px;
    width: calc(100% - 30px);
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:disabled { background: #ccc; }
button:not(:disabled) { background: #2ecc71; color: white; }
</style>
</head>

<body>

<h3>Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>
<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;
let rotation = 0;

// gesture state
let isDragging = false;
let lastX = 0;
let lastY = 0;

let startScale = 1;
let startRotation = 0;
let startPosX = 0;
let startPosY = 0;
let startDistance = 0;
let startAngle = 0;
let startCenter = {x:0,y:0};

// UX
let snapActive = false;
let snapAngle = 0;
let hasVibrated = false;
let isInteracting = false;


// =====================
// FRAME
// =====================
const hostname = window.location.hostname;

const frameMap = {
    "rtiq.bernad.my.id": "frame.png",
    "fam.bernad.my.id": "frame1.png"
};

let frameSrc = frameMap[hostname];

if (!frameSrc) {
    document.body.innerHTML = "<h2 style='margin-top:50px;'>Tidak ada frame untuk sub-domain ini!</h2>";
    throw new Error();
}

const frame = new Image();
frame.src = frameSrc;


// =====================
// DRAW
// =====================
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (userImage) {
        ctx.save();
        ctx.translate(canvas.width/2 + posX, canvas.height/2 + posY);
        ctx.rotate(rotation);
        ctx.scale(scale, scale);
        ctx.drawImage(userImage, -userImage.width/2, -userImage.height/2);
        ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = isInteracting ? 0.6 : 1;
    ctx.drawImage(frame,0,0,canvas.width,canvas.height);
    ctx.restore();

    // SNAP GUIDE
    if (snapActive) {
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(snapAngle);

        ctx.strokeStyle = "rgba(0,255,0,0.8)";
        ctx.lineWidth = 3;
        ctx.setLineDash([12,8]);

        ctx.beginPath();
        ctx.moveTo(-canvas.width,0);
        ctx.lineTo(canvas.width,0);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,-canvas.height);
        ctx.lineTo(0,canvas.height);
        ctx.stroke();

        ctx.restore();
    }
}


// =====================
// LOAD IMAGE
// =====================
fileInput.addEventListener('change', e=>{
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = ()=>{
        userImage = img;

        scale = Math.max(canvas.width/img.width, canvas.height/img.height);
        posX = posY = rotation = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});

canvas.addEventListener('click', ()=>{
    if (!userImage) fileInput.click();
});


// =====================
// DRAG
// =====================
canvas.addEventListener('touchstart', e=>{
    if (!userImage) return;
    isInteracting = true;

    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }

    if (e.touches.length === 2) {
        const rect = canvas.getBoundingClientRect();

        startDistance = getDistance(e.touches);
        startAngle = getAngle(e.touches);

        startScale = scale;
        startRotation = rotation;
        startPosX = posX;
        startPosY = posY;

        startCenter = {
            x: ((e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left) * (canvas.width / rect.width),
            y: ((e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top) * (canvas.height / rect.height)
        };
    }
});

canvas.addEventListener('touchmove', e=>{
    if (!userImage) return;
    e.preventDefault();

    if (e.touches.length === 1 && isDragging) {
        let x = e.touches[0].clientX;
        let y = e.touches[0].clientY;

        posX += x - lastX;
        posY += y - lastY;

        lastX = x;
        lastY = y;
    }

    if (e.touches.length === 2) {
        const rect = canvas.getBoundingClientRect();

        const currentDistance = getDistance(e.touches);
        const currentAngle = getAngle(e.touches);

        const currentCenter = {
            x: ((e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left) * (canvas.width / rect.width),
            y: ((e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top) * (canvas.height / rect.height)
        };

        // SCALE
        let scaleFactor = currentDistance / startDistance;
        scale = Math.min(Math.max(0.2, startScale * scaleFactor), 5);

        // ROTATE
        let deltaAngle = currentAngle - startAngle;
        if (deltaAngle > Math.PI) deltaAngle -= 2*Math.PI;
        if (deltaAngle < -Math.PI) deltaAngle += 2*Math.PI;

        rotation = startRotation + deltaAngle;

        // POSITION (anchor pinch)
        const dx = startPosX;
        const dy = startPosY;

        const cos = Math.cos(deltaAngle);
        const sin = Math.sin(deltaAngle);

        posX = currentCenter.x - (startCenter.x - dx) * scaleFactor * cos + (startCenter.y - dy) * scaleFactor * sin;
        posY = currentCenter.y - (startCenter.x - dx) * scaleFactor * sin - (startCenter.y - dy) * scaleFactor * cos;

        // SNAP
        const snap = Math.PI/2;
        const target = Math.round(rotation/snap)*snap;
        const diff = target - rotation;

        if (Math.abs(diff) < 0.15) {
            rotation += diff * 0.25;
            snapActive = true;
            snapAngle = target;

            if (!hasVibrated && navigator.vibrate) {
                navigator.vibrate(10);
                hasVibrated = true;
            }
        } else {
            snapActive = false;
            hasVibrated = false;
        }
    }

    draw();
});

canvas.addEventListener('touchend', ()=>{
    isDragging = false;
    isInteracting = false;
    snapActive = false;
    hasVibrated = false;
    draw();
});


// =====================
// HELPERS
// =====================
function getDistance(t){
    return Math.hypot(
        t[0].clientX - t[1].clientX,
        t[0].clientY - t[1].clientY
    );
}

function getAngle(t){
    return Math.atan2(
        t[1].clientY - t[0].clientY,
        t[1].clientX - t[0].clientX
    );
}


// =====================
// DOWNLOAD
// =====================
downloadBtn.addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.download = generateFileName();
    a.href = canvas.toDataURL('image/png');
    a.click();
});

function generateFileName(){
    const now = new Date();
    const day = String(now.getDate()).padStart(2,'0');
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    const month = months[now.getMonth()];
    const year = now.getFullYear();
    return `RTIQ_${day} ${month} ${year}_${Date.now()}.png`;
}

frame.onload = draw;
</script>

</body>
</html>
