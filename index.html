<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twibbon Lite</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #canvasWrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 4/5;
    margin-top: 20px;
    background: #ddd;
    overflow: hidden;
    touch-action: none;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #downloadBtn {
    margin: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #fff;
    font-size: 16px;
    opacity: 0.5;
  }

  #downloadBtn.active {
    opacity: 1;
    cursor: pointer;
  }

  #msg {
    margin-top: 50px;
    font-size: 18px;
    color: #333;
  }
</style>
</head>
<body>

<div id="msg" style="display:none">Tidak ada frame untuk sub-domain ini!</div>

<div id="canvasWrap" style="display:none">
  <canvas id="canvas"></canvas>
</div>

<button id="downloadBtn">Download</button>

<input type="file" id="fileInput" accept="image/*" hidden />

<script>
const hostname = location.hostname;
let frameSrc = null;

if (hostname.includes("rtiq")) frameSrc = "frame.png";
else if (hostname.includes("fam")) frameSrc = "frame1.png";

const msg = document.getElementById("msg");
const wrap = document.getElementById("canvasWrap");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const input = document.getElementById("fileInput");
const btn = document.getElementById("downloadBtn");

if (!frameSrc) {
  msg.style.display = "block";
  btn.style.display = "none";
  throw new Error("No frame");
}

wrap.style.display = "block";

let frame = new Image();
let userImg = new Image();
let hasImage = false;

let state = {
  x: 0,
  y: 0,
  scale: 1,
  rotation: 0
};

let touches = [];

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener("resize", resizeCanvas);

frame.src = frameSrc;
frame.onload = resizeCanvas;

wrap.addEventListener("click", () => {
  if (!hasImage) input.click();
});

input.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  userImg.src = url;
  userImg.onload = () => {
    hasImage = true;
    state.scale = 1;
    state.rotation = 0;
    state.x = canvas.width/2;
    state.y = canvas.height/2;
    btn.classList.add("active");
    draw();
  };
};

function draw(dim=false) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (hasImage) {
    ctx.save();
    ctx.translate(state.x, state.y);
    ctx.rotate(state.rotation);
    ctx.scale(state.scale, state.scale);
    ctx.drawImage(userImg, -userImg.width/2, -userImg.height/2);
    ctx.restore();
  }

  if (dim) ctx.globalAlpha = 0.5;
  ctx.drawImage(frame,0,0,canvas.width,canvas.height);
  ctx.globalAlpha = 1;

  drawGuide();
}

function drawGuide() {
  const deg = Math.round(state.rotation * 180 / Math.PI);
  const snap = [0,90,180,270].find(a => Math.abs(deg - a) < 5);
  if (snap !== undefined) {
    ctx.strokeStyle = "lime";
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (snap % 180 === 0) {
      ctx.moveTo(canvas.width/2,0);
      ctx.lineTo(canvas.width/2,canvas.height);
    } else {
      ctx.moveTo(0,canvas.height/2);
      ctx.lineTo(canvas.width,canvas.height/2);
    }
    ctx.stroke();
  }
}

wrap.addEventListener("touchstart", e => {
  touches = e.touches;
  draw(true);
});

wrap.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!hasImage) return;

  if (e.touches.length === 1) {
    let dx = e.touches[0].movementX || 0;
    let dy = e.touches[0].movementY || 0;
    state.x += dx;
    state.y += dy;
  }

  if (e.touches.length === 2) {
    const [a,b] = e.touches;
    const dx = b.clientX - a.clientX;
    const dy = b.clientY - a.clientY;
    const dist = Math.hypot(dx,dy);

    if (touches.length === 2) {
      const [pa,pb] = touches;
      const pdx = pb.clientX - pa.clientX;
      const pdy = pb.clientY - pa.clientY;
      const pdist = Math.hypot(pdx,pdy);

      state.scale *= dist / pdist;

      const angle = Math.atan2(dy,dx);
      const pangle = Math.atan2(pdy,pdx);
      state.rotation += angle - pangle;
    }
  }

  touches = e.touches;
  draw(true);
});

wrap.addEventListener("touchend", () => {
  snapRotation();
  draw(false);
});

function snapRotation() {
  const deg = state.rotation * 180 / Math.PI;
  const snaps = [0,90,180,270];
  snaps.forEach(s => {
    if (Math.abs(deg - s) < 5) {
      state.rotation = s * Math.PI / 180;
    }
  });
}

wrap.addEventListener("wheel", e => {
  if (!hasImage) return;
  e.preventDefault();
  state.scale += e.deltaY * -0.001;
  draw();
});

btn.onclick = () => {
  if (!hasImage) return;

  const out = document.createElement("canvas");
  out.width = canvas.width;
  out.height = canvas.height;
  const octx = out.getContext("2d");

  octx.drawImage(canvas,0,0);

  const link = document.createElement("a");
  const date = new Date();
  const name = `RTIQ_${date.toDateString()}_${Date.now()}.png`;

  link.download = name;
  link.href = out.toDataURL();
  link.click();
};
</script>

</body>
</html>
