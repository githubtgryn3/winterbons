<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Twibbon Lite Mobile</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
        text-align: center;
    }

    h3 {
        margin: 15px 0;
        font-size: 16px;
    }

    #container {
        width: 100%;
        max-width: 420px;
        margin: auto;
        position: relative;
    }

    canvas {
        width: 100%;
        height: auto;
        background: white;
        border-radius: 12px;
        touch-action: none;
    }

    button {
        margin: 15px;
        padding: 14px;
        width: calc(100% - 30px);
        border: none;
        border-radius: 10px;
        font-size: 16px;
    }

    button:disabled {
        background: #ccc;
    }

    button:not(:disabled) {
        background: #2ecc71;
        color: white;
    }
</style>
</head>

<body>

<h3>Klik Frame untuk Masukkan Foto</h3>

<div id="container">
    <canvas id="canvas" width="400" height="400"></canvas>
</div>

<button id="downloadBtn" disabled>Silahkan Masukkan Foto</button>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const fileInput = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');
const container = document.getElementById('container');

let userImage = null;

// transform
let scale = 1;
let posX = 0;
let posY = 0;

// touch state
let lastTouchDistance = null;
let lastTouchCenter = null;
let isDragging = false;

// ===== FRAME =====
const frame = new Image();
frame.crossOrigin = "anonymous";
frame.src = "frame.png";

// ===== DRAW =====
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImage) {
        ctx.save();
        ctx.translate(posX, posY);
        ctx.scale(scale, scale);

        ctx.drawImage(
            userImage,
            canvas.width / 2 - userImage.width / 2,
            canvas.height / 2 - userImage.height / 2
        );

        ctx.restore();
    }

    ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
}

// ===== LOAD IMAGE =====
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
        userImage = img;

        scale = 1;
        posX = 0;
        posY = 0;

        draw();

        downloadBtn.disabled = false;
        downloadBtn.innerText = "Download";
    };

    img.src = URL.createObjectURL(file);
});

// klik canvas
canvas.addEventListener('click', () => {
    if (!userImage) fileInput.click();
});

// ===== TOUCH EVENTS =====
canvas.addEventListener('touchstart', (e) => {
    if (!userImage) return;

    if (e.touches.length === 1) {
        isDragging = true;
    }

    if (e.touches.length === 2) {
        lastTouchDistance = getDistance(e.touches);
        lastTouchCenter = getCenter(e.touches);
    }
});

canvas.addEventListener('touchmove', (e) => {
    if (!userImage) return;
    e.preventDefault();

    // DRAG
    if (e.touches.length === 1 && isDragging) {
        posX += e.touches[0].movementX || 0;
        posY += e.touches[0].movementY || 0;
    }

    // PINCH ZOOM
    if (e.touches.length === 2) {
        const newDistance = getDistance(e.touches);
        const newCenter = getCenter(e.touches);

        let zoom = newDistance / lastTouchDistance;
        scale *= zoom;

        scale = Math.min(Math.max(0.2, scale), 5);

        posX += (newCenter.x - lastTouchCenter.x);
        posY += (newCenter.y - lastTouchCenter.y);

        lastTouchDistance = newDistance;
        lastTouchCenter = newCenter;
    }

    draw();
});

canvas.addEventListener('touchend', () => {
    isDragging = false;
    lastTouchDistance = null;
});

// ===== HELPER =====
function getDistance(touches) {
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}

function getCenter(touches) {
    return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
    };
}

// ===== DOWNLOAD =====
downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'hasil.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
});

// ===== INIT =====
frame.onload = draw;
</script>

</body>
</html>
